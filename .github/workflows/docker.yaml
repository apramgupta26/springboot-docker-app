name: Build, Push and Deploy Spring Boot Application

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG: latest
  CONTAINER_NAME: springboot-docker-app

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:$TAG .
          docker images

      - name: Push Docker Image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:$TAG

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Configure SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy Application
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

          echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

          # Clean unused Docker resources
          sudo docker system prune -af
          sudo docker volume prune -f

          # Pull latest image
          sudo docker pull $REGISTRY/$IMAGE_NAME:$TAG

          # Stop and remove existing container
          sudo docker stop $CONTAINER_NAME || true
          sudo docker rm $CONTAINER_NAME || true

          # Run new container
          sudo docker run -d --name springboot-docker-app -p 80:80 $REGISTRY/$IMAGE_NAME:$TAG

          EOF
          
          
          
          
          
          